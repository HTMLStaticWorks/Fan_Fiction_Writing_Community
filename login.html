<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FanFicHub | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: url('assets/images/hero-bg.png') no-repeat center center;
      background-size: cover;
      position: relative;
      padding: 5rem 1rem 3rem;
    }
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.5);
      z-index: -1;
    }
    .auth-card {
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      transition: background 0.3s, border 0.3s;
    }
    
    [data-theme="light"] .auth-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    [data-theme="dark"] .auth-card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .auth-toggles {
      position: absolute;
      top: 20px;
      inset-inline-end: 20px;
    }
    
    [data-theme="dark"] .auth-toggles button {
      background: rgba(15, 23, 42, 0.8) !important;
      color: #f8fafc !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
    }
    
    [data-theme="light"] .auth-toggles button {
      background: rgba(255, 255, 255, 0.8) !important;
      color: #0f172a !important;
      border: 1px solid rgba(0, 0, 0, 0.1) !important;
    }
  </style>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- Top Right Toggles -->
  <div class="auth-toggles d-flex gap-2">
    <button id="themeToggle" class="btn shadow-sm btn-sm" aria-label="Toggle Theme" style="backdrop-filter: blur(4px);"><i class="ph-fill ph-moon-stars"></i></button>
    <button id="rtlToggle" class="btn shadow-sm btn-sm" aria-label="Toggle RTL" style="backdrop-filter: blur(4px);"><i class="ph-bold ph-arrows-left-right"></i></button>
  </div>

  <div class="auth-card text-center shadow-lg">
    <!-- Logo -->
    <a class="navbar-brand mb-4 justify-content-center" href="index.html">
      <i class="ph-fill ph-book-open-text me-2 text-primary" style="font-size: 1.5rem;"></i>
      FanFicHub
    </a>
    
    <h1 class="h4 mb-4 fw-bold" style="color: var(--text-main);"><span class="gradient-text">Welcome Back, Creator</span></h1>
    
    <form class="text-start needs-validation" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label" style="color: var(--text-main);">Email address</label>
        <input type="email" class="form-control form-control-custom" id="email" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>
      
      <div class="mb-3">
        <label for="password" class="form-label" style="color: var(--text-main);">Password</label>
        <div class="input-group">
          <input type="password" class="form-control form-control-custom" id="password" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePassword"><i class="ph-fill ph-eye align-middle"></i></button>
        </div>
        <div class="invalid-feedback">Please enter your password.</div>
      </div>
      
      <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2 mb-4 text-center">
        <div class="form-check m-0">
          <input type="checkbox" class="form-check-input" id="rememberMe">
          <label class="form-check-label small" for="rememberMe" style="color: var(--text-main);">Remember Me</label>
        </div>
        <a href="#" class="small text-decoration-none">Forgot Password?</a>
      </div>
      
      <button type="submit" class="btn btn-primary-custom w-100 mb-3">Login</button>
      
      <div class="d-flex align-items-center mb-3">
        <hr class="flex-grow-1">
        <span class="mx-2 small text-muted">OR</span>
        <hr class="flex-grow-1">
      </div>
      
      <div class="d-flex gap-2 mb-4">
        <button type="button" class="btn btn-outline-custom w-100 d-flex align-items-center justify-content-center gap-2" style="color: var(--text-main); border-color: var(--border-color);">
          <i class="ph-fill ph-google-logo text-danger" style="font-size: 1.25rem;"></i> Google
        </button>
        <button type="button" class="btn btn-outline-custom w-100 d-flex align-items-center justify-content-center gap-2" style="color: var(--text-main); border-color: var(--border-color);">
          <i class="ph-fill ph-apple-logo" style="font-size: 1.25rem; color: var(--text-main);"></i> Apple
        </button>
      </div>
      
      <p class="text-center small mb-0" style="color: var(--text-main);">
        Don't have an account? <a href="register.html">Sign Up</a>
      </p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');
    if(togglePassword) {
      togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
      });
    }
  </script>
  <button id="backToTop" aria-label="Back to Top">↑</button>
</body>
</html>
