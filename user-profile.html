<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Fan Fiction Writing Community</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-light">

  <!-- Header -->
  <nav class="navbar navbar-expand-xl navbar-custom sticky-top bg-white border-bottom shadow-sm">
    <div class="container-fluid px-3 px-md-4">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="ph-fill ph-book-open-text text-primary" style="font-size: 1.5rem;"></i>
        <span class="ms-1">FanFicHub</span>
      </a>
      
      <div class="d-flex ms-auto gap-2 gap-md-3 align-items-center">
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm border-0 px-1" aria-label="Toggle Theme"><i class="ph-fill ph-moon-stars fs-5"></i></button>
        <button id="rtlToggle" class="btn btn-outline-secondary btn-sm border-0 px-1" aria-label="Toggle RTL"><i class="ph-bold ph-arrows-left-right fs-5"></i></button>
        
        <div class="dropdown">
          <a href="#" class="d-flex align-items-center link-dark text-decoration-none border border-dark rounded px-1 py-1 bg-white" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="https://i.pravatar.cc/80?img=47" alt="User" width="26" height="26" class="rounded-circle">
            <i class="ph-bold ph-caret-down ms-1" style="font-size: 0.8rem;"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end text-small shadow" aria-labelledby="dropdownUser1">
            <li><a class="dropdown-item" href="dashboard.html"><i class="ph-fill ph-user-switch me-2"></i>Switch to Writer</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="index.html"><i class="ph-bold ph-sign-out me-2"></i>Sign out</a></li>
          </ul>
        </div>

        <button class="btn text-dark p-0 border-0 d-md-none ms-1 text-decoration-none" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle sidebar">
          <i class="ph-bold ph-list" style="font-size: 1.8rem;"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="container-fluid pb-5">
    <div class="row">
      <!-- Sidebar -->
      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse border-end vh-100 py-3">
        <div class="position-sticky sidebar-sticky">
          <ul class="nav flex-column gap-2 px-2">
            <li class="nav-item">
              <a class="nav-link text-body hover-lift rounded" href="user-dashboard.html">
                <i class="ph-fill ph-user me-2"></i>Profile
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-body hover-lift rounded" href="user-reading-lists.html">
                <i class="ph-fill ph-bookmarks me-2"></i>Reading Lists
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-body hover-lift rounded" href="user-orders.html">
                <i class="ph-fill ph-receipt me-2"></i>Order History
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-body hover-lift rounded" href="user-messages.html">
                <i class="ph-fill ph-envelope-simple me-2"></i>Messages
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-body hover-lift rounded" href="user-settings.html">
                <i class="ph-fill ph-gear me-2"></i>Settings
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center p-4 pb-5 mb-4 rounded-4 shadow-sm position-relative text-white overflow-hidden" style="background: url('assets/images/fandoms-bg.png') center/cover;">
          <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-75"></div>
          <div class="position-relative z-1 d-flex w-100 justify-content-between align-items-center pt-2">
            <div>
              <h1 class="h2 fw-bold mb-0"><span class="gradient-text">Profile</span></h1>
              <p class="text-muted opacity-75 mb-0 small mt-1">Manage your stories, analytics, and interactions.</p>
            </div>
            <div class="btn-toolbar mb-2 mb-md-0">
              <button type="button" class="btn btn-primary-custom fw-bold shadow-sm btn-dash-action">
                + New Story
              </button>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4 p-5 text-center bg-white mt-4">
          <i class="ph-fill ph-hammer text-muted mb-3" style="font-size: 3rem;"></i>
          <h3 class="fw-bold text-dark">Profile Content</h3>
          <p class="text-muted mb-0">This section is currently under construction. Content for Profile will appear here.</p>
        </div>
      </main>
    </div>
  </div>

    <button id="backToTop" aria-label="Back to Top">↑</button>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
