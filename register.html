<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FanFicHub | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 76px);
      background: url('assets/images/hero-bg.png') no-repeat center center;
      background-size: cover;
      position: relative;
      padding: 2rem 0;
    }
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.5);
      z-index: -1;
    }
    .auth-card {
      padding: 3rem;
      width: 100%;
      max-width: 480px;
    }
    .auth-toggles {
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- Top Right Toggles -->
  <div class="auth-toggles d-flex gap-2">
    <button id="themeToggle" class="btn btn-outline-secondary btn-sm border-0" aria-label="Toggle Theme"><i class="ph-fill ph-moon-stars text-secondary"></i></button>
    <button id="rtlToggle" class="btn btn-outline-secondary btn-sm border-0" aria-label="Toggle RTL"><i class="ph-bold ph-arrows-left-right text-secondary"></i></button>
  </div>

  <div class="auth-card text-center shadow-lg">
    <a class="navbar-brand mb-4 justify-content-center" href="index.html">
      <i class="ph-fill ph-book-open-text me-2 text-primary" style="font-size: 1.5rem;"></i>
      FanFicHub
    </a>
    
    <h1 class="h4 mb-4 fw-bold text-white"><span class="gradient-text">Join Thousands of Writers</span></h1>
    
    <form class="text-start needs-validation" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label" style="color: var(--text-main);">Username</label>
        <input type="text" class="form-control form-control-custom" id="username" required>
        <div class="invalid-feedback">Username is required.</div>
      </div>
      
      <div class="mb-3">
        <label for="email" class="form-label" style="color: var(--text-main);">Email address</label>
        <input type="email" class="form-control form-control-custom" id="email" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>
      
      <div class="mb-3">
        <label for="password" class="form-label" style="color: var(--text-main);">Password</label>
        <div class="input-group">
          <input type="password" class="form-control form-control-custom" id="password" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePassword"><i class="ph-fill ph-eye align-middle"></i></button>
        </div>
        <div class="invalid-feedback">Please enter a password.</div>
      </div>
      
      <button type="submit" class="btn btn-primary-custom w-100 mb-3 mt-2">Sign Up</button>
      
      <div class="d-flex align-items-center mb-3">
        <hr class="flex-grow-1">
        <span class="mx-2 small text-muted">OR</span>
        <hr class="flex-grow-1">
      </div>
      
      <div class="d-flex gap-2 mb-4">
        <button type="button" class="btn btn-outline-custom w-100 d-flex align-items-center justify-content-center gap-2">
          Google
        </button>
        <button type="button" class="btn btn-outline-custom w-100 d-flex align-items-center justify-content-center gap-2">
          Apple
        </button>
      </div>
      
      <p class="text-center small mb-0" style="color: var(--text-main);">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');
    if(togglePassword) {
      togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
      });
    }
  </script>
</body>
</html>
