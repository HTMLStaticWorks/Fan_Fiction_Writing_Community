<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FanFicHub | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-main);
      padding: 2rem 0;
    }
    .auth-card {
      background-color: var(--bg-card);
      padding: 2.5rem;
      border-radius: var(--radius-card);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 450px;
      border: 1px solid var(--border-color);
    }
    .auth-toggles {
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

  <!-- Top Right Toggles -->
  <div class="auth-toggles d-flex gap-2">
    <button id="themeToggle" class="btn btn-outline-secondary btn-sm border-0" aria-label="Toggle Theme">🌓</button>
    <button id="rtlToggle" class="btn btn-outline-secondary btn-sm border-0" aria-label="Toggle RTL">⇄</button>
  </div>

  <div class="auth-card text-center">
    <a class="navbar-brand mb-4 justify-content-center" href="index.html">
      <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16" class="me-2"><path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811V2.828zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492V2.687zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z"/></svg>
      FanFicHub
    </a>
    
    <h1 class="h4 mb-4 fw-bold">Join Thousands of Writers</h1>
    
    <form class="text-start needs-validation" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label" style="color: var(--text-main);">Username</label>
        <input type="text" class="form-control form-control-custom" id="username" required>
        <div class="invalid-feedback">Username is required.</div>
      </div>
      
      <div class="mb-3">
        <label for="email" class="form-label" style="color: var(--text-main);">Email address</label>
        <input type="email" class="form-control form-control-custom" id="email" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>
      
      <div class="mb-3">
        <label for="password" class="form-label" style="color: var(--text-main);">Password</label>
        <div class="input-group">
          <input type="password" class="form-control form-control-custom" id="password" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">👁️</button>
        </div>
        <div class="invalid-feedback">Please enter a password.</div>
      </div>
      
      <button type="submit" class="btn btn-primary-custom w-100 mb-3 mt-2">Sign Up</button>
      
      <div class="d-flex align-items-center mb-3">
        <hr class="flex-grow-1">
        <span class="mx-2 small text-muted">OR</span>
        <hr class="flex-grow-1">
      </div>
      
      <div class="d-flex gap-2 mb-4">
        <button type="button" class="btn btn-outline-custom w-100 d-flex align-items-center justify-content-center gap-2">
          Google
        </button>
        <button type="button" class="btn btn-outline-custom w-100 d-flex align-items-center justify-content-center gap-2">
          Apple
        </button>
      </div>
      
      <p class="text-center small mb-0" style="color: var(--text-main);">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');
    if(togglePassword) {
      togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
      });
    }
  </script>
</body>
</html>
